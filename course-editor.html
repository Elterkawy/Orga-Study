<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Éditeur de cours — OrgaStudy</title>
  <link rel="stylesheet" href="OrgaStudy.css">
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#fff;padding:0;margin:0}
    .editor-shell{max-width:1000px;margin:20px auto;padding:20px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;background:linear-gradient(90deg,#f8fafc,#eef2ff);padding:8px;border-radius:10px;border:1px solid #e6e6f0}
    .toolbar button{padding:8px 10px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366F1,#8b5cf6);color:white;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    .toolbar button svg{width:18px;height:18px;fill:currentColor}
    .toolbar button:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(99,102,241,0.15)}
    .toolbar .ghost{background:transparent;color:#374151;border:1px solid transparent}
    .title-input{width:100%;padding:12px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;font-size:18px}
    .editor-area{min-height:60vh;border:1px solid #e5e7eb;border-radius:8px;padding:16px}
    .editor-area:focus{outline:3px solid rgba(99,102,241,0.15)}
    .controls{display:flex;gap:8px;margin-top:12px}
  </style>
</head>
<body>
  <div class="editor-shell">
    <input id="course-title" class="title-input" placeholder="Titre du cours (ex: Mathématiques)" />
    <div class="toolbar">
      <button data-cmd="bold" title="Gras">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h5a3 3 0 0 1 0 6H8v2h6a3 3 0 0 1 0 6H7z"></path></svg>
      </button>
      <button data-cmd="italic" title="Italique">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4v3h2.21l-3.42 10H6v3h8v-3h-2.21l3.42-10H18V4z"></path></svg>
      </button>
      <button data-cmd="underline" title="Souligné">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3v6a7 7 0 0 0 14 0V3h-3v6a4 4 0 0 1-8 0V3zM5 20v2h14v-2z"></path></svg>
      </button>
      <button data-cmd="h1" title="Titre H1" class="ghost">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h3v14H3zM18 5v6h-4v8h-3V11H7V5z"></path></svg>
      </button>
      <button data-cmd="h2" title="Titre H2" class="ghost">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h2v16H5zM9 4h6a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-4v3h5v2H9z"></path></svg>
      </button>
      <button data-cmd="insertUnorderedList" title="Liste à puces">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h14v2H7zM7 12h14v2H7zM7 18h14v2H7zM3 6h2v2H3zM3 12h2v2H3zM3 18h2v2H3z"></path></svg>
      </button>
      <button data-cmd="insertOrderedList" title="Liste numérotée">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 6h14v2H7zM7 12h14v2H7zM7 18h14v2H7zM2 6h3v2H2zM2 12h3v2H2zM2 18h3v2H2z"></path></svg>
      </button>
      <button data-cmd="createLink" title="Insérer un lien" class="ghost">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.9 12a5 5 0 0 1 0-7.07l1.41 1.41a3 3 0 0 0 0 4.24l1.77 1.77a3 3 0 0 0 4.24 0l1.41 1.41A5 5 0 0 1 3.9 12zM20.1 12a5 5 0 0 1 0 7.07l-1.41-1.41a3 3 0 0 0 0-4.24l-1.77-1.77a3 3 0 0 0-4.24 0L10 9.31A5 5 0 0 1 20.1 12z"></path></svg>
      </button>
      <button data-cmd="insertImage" title="Insérer une image" class="ghost">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14l4-4 3 3 5-5 5 5z"></path></svg>
      </button>
      <button data-cmd="clearFormatting" title="Effacer le formatage" class="ghost">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"></path></svg>
      </button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <label style="font-size:13px;color:#374151">Autosave</label>
        <span id="autosave-indicator" style="font-size:13px;color:#64748b">Off</span>
      </div>
    </div>

    <div id="editor" class="editor-area" contenteditable="true"></div>

    <div class="controls">
      <button id="save-course">Sauvegarder et Fermer</button>
      <button id="save-continue">Sauvegarder (continuer)</button>
      <button id="cancel">Annuler</button>
    </div>
  </div>

  <script src="course-editor.js"></script>
</body>
</html>
